{% extends 'ManageCash/base.html' %}

{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-2xl">
      <!-- Profile Card -->
      <div class="bg-white border border-gray-100 rounded-3xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-8">
          <div class="flex items-center gap-5">
            <!-- User Info -->
            <div>
              <!-- Fixed Username -->
              <h2 class="text-2xl font-bold text-white">Hello! {{ user.username }}</h2>

              <h3 class="text-lg font-medium text-indigo-100 mt-1">Profile Settings</h3>

              <p class="text-indigo-200 mt-2 text-sm">Update your account information and profile details</p>
            </div>
          </div>
        </div>

        <!-- Form -->
        <form method="post" class="p-8 space-y-6">
          {% csrf_token %}

          <!-- Username -->
          <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>

            <input type="text" name="username" id="username" value="{{ user.username }}" placeholder="Enter your username" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200" required />
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>

            <input type="email" name="email" id="email" value="{{ user.email }}" placeholder="Enter your email address" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200" />
          </div>

          <!-- Extra Info -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Account Status -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <p class="text-sm text-gray-500 mb-1">Account Status</p>

              <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>

                <span class="font-semibold text-gray-800">Active</span>
              </div>
            </div>

            <!-- Welcome Card -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <p class="text-sm text-gray-500 mb-1">Welcome Back</p>

              <p class="font-semibold text-gray-800">{{ user.username }}</p>
            </div>
          </div>

          <!-- Buttons -->
          <div class="flex items-center justify-end gap-4 pt-4 border-t border-gray-100">
            <a href="{% url 'dashboard' %}" class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition duration-200">Cancel</a>

            <button type="submit" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition duration-200">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
