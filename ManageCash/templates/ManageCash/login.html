{% extends 'ManageCash/base.html' %}

{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
      <!-- Login Card -->
      <div class="bg-white border border-gray-100 rounded-3xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-8 text-center">
          <h3 class="text-blue-100 mt-2 text-sm">Login to manage your income and expenses</h3>
        </div>

        <!-- Form -->
        <form method="post" class="p-8 space-y-6">
          {% csrf_token %}

          <!-- Username / Email -->
          <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username or Email</label>

            <input type="text" name="username" id="username" placeholder="Enter your username or email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200" required />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="text-sm font-semibold text-gray-700">Password</label>

              <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Forgot Password?</a>
            </div>

            <input type="password" name="password" id="password" placeholder="Enter your password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200" required />
          </div>

          <!-- Remember Me -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />

              <span class="text-sm text-gray-600">Remember me</span>
            </label>
          </div>

          <!-- Button -->
          <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition duration-200">Login</button>
        </form>

        <!-- Footer -->
        <div class="px-8 pb-8 text-center">
          <p class="text-sm text-gray-600">
            Don’t have an account?

            <a href="{% url 'register' %}" class="text-blue-600 hover:text-blue-700 font-semibold">Create Account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
