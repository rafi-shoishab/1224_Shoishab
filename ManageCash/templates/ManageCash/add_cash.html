{% extends 'ManageCash/base.html' %}
{% block content %}
<div class="bg-white shadow rounded p-6">
  <h2 class="text-2xl font-semibold mb-4">Add Cash</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label for="source" class="block text-sm font-medium text-gray-700">Source</label>
      <input type="text" name="source" id="source" class="mt-1 block w-full px-3 py-2 border rounded-md" required>
    </div>
    <div>
      <label for="amount" class="block text-sm font-medium text-gray-700">Amount</label>
      <input type="text" name="amount" id="amount" class="mt-1 block w-full px-3 py-2 border rounded-md" required>
    </div>
    <div>
      <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
      <textarea name="description" id="description" class="mt-1 block w-full px-3 py-2 border rounded-md" rows="3"></textarea>
    </div>
    <div>
      <button class="px-4 py-2 bg-green-600 text-white rounded" type="submit">Add</button>
    </div>
  </form>
</div>
{% endblock %}
