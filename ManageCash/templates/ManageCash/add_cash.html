{% extends 'ManageCash/base.html' %}
{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-10">
    <div class="w-full max-w-2xl">
      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-600 to-green-500 px-8 py-6">
          <h2 class="text-3xl font-bold text-white">Add Cash</h2>
          <p class="text-green-100 mt-1 text-sm">Enter your cash transaction details below</p>
        </div>

        <!-- Form -->
        <form method="post" class="p-8 space-y-6">
          {% csrf_token %}

          <!-- Source -->
          <div>
            <label for="source" class="block text-sm font-semibold text-gray-700 mb-2">Source</label>
            <input type="text" name="source" id="source" placeholder="e.g. Salary, Business, Freelancing" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition duration-200" required />
          </div>

          <!-- Amount -->
          <div>
            <label for="amount" class="block text-sm font-semibold text-gray-700 mb-2">Amount</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-gray-500 font-medium">৳</span>
              <input type="number" step="0.01" name="amount" id="amount" placeholder="0.00" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition duration-200" required />
            </div>
          </div>

          <!-- Description -->
          <div>
            <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
            <textarea name="description" id="description" rows="4" placeholder="Write additional details..." class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition duration-200 resize-none"></textarea>
          </div>

          <!-- Buttons -->
          <div class="flex items-center justify-end gap-4 pt-2">
            <a href="#" class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition duration-200">Cancel</a>

            <button type="submit" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition duration-200">Add Cash</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
