{% extends 'ManageCash/base.html' %}

{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-10 px-4">
    <div class="w-full max-w-2xl">
      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-red-600 to-rose-500 px-8 py-6">
          <h2 class="text-3xl font-bold text-white">Add Expense</h2>
          <p class="text-red-100 mt-1 text-sm">Record and manage your daily expenses professionally</p>
        </div>

        <!-- Form -->
        <form method="post" class="p-8 space-y-6">
          {% csrf_token %}

          <!-- Expense Description -->
          <div>
            <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Expense Description</label>

            <input type="text" name="description" id="description" placeholder="e.g. Food, Shopping, Transport" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition duration-200" required />
          </div>

          <!-- Amount -->
          <div>
            <label for="amount" class="block text-sm font-semibold text-gray-700 mb-2">Amount</label>

            <div class="relative">
              <span class="absolute left-4 top-3.5 text-gray-500 font-medium">৳</span>

              <input type="number" step="0.01" name="amount" id="amount" placeholder="0.00" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition duration-200" required />
            </div>
          </div>

          <!-- Optional Notes -->
          <div>
            <label for="notes" class="block text-sm font-semibold text-gray-700 mb-2">Notes</label>

            <textarea name="notes" id="notes" rows="4" placeholder="Add additional details..." class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition duration-200 resize-none"></textarea>
          </div>

          <!-- Buttons -->
          <div class="flex items-center justify-end gap-4 pt-2">
            <a href="#" class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition duration-200">Cancel</a>

            <button type="submit" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition duration-200">Add Expense</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
