{% extends 'ManageCash/base.html' %}
{% block content %}
<div class="bg-white shadow rounded p-6">
  <h2 class="text-2xl font-semibold mb-4">Register</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
      <input type="text" name="username" id="username" class="mt-1 block w-full px-3 py-2 border rounded-md" required>
    </div>
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
      <input type="email" name="email" id="email" class="mt-1 block w-full px-3 py-2 border rounded-md">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
      <input type="password" name="password" id="password" class="mt-1 block w-full px-3 py-2 border rounded-md" required>
    </div>
    <div>
      <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
      <input type="password" name="confirm_password" id="confirm_password" class="mt-1 block w-full px-3 py-2 border rounded-md" required>
    </div>
    <div>
      <button class="w-full bg-blue-600 text-white px-4 py-2 rounded" type="submit">Register</button>
    </div>
  </form>
</div>
{% endblock %}
